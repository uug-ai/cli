apiVersion: batch/v1
kind: Job
metadata:
  name: uugai-cli-migrate-legacy-media
spec:
  template:
    spec:
      containers:
      - name: init-container
        image: ghcr.io/uug-ai/cli:v1.2.14
        command: ['/main', '-action', 'migrate-legacy-media',
          '-mongodb-uri', 'mongodb+srv://<username>:<password>@<host>/<database>?retryWrites=true&w=majority&appName=<appName>',
          #'-mongodb-host', '<host>',
          #'-mongodb-port', '27017',
          #'-mongodb-username', '<username>',
          #'-mongodb-password', '<password>',
          #'-mongodb-database-credentials', 'admin',
          '-mongodb-destination-database', 'Kerberos',

          # Run full migration for all media and all users:
          '-mode', 'live',
          '-generate-default-marker-options',
          # '-migration-timeout-minutes', '0', # disable timeout for long full-dataset runs

          # Optional scope filters (leave commented to process everything):
          #'-organisation-id', '<organisationId>',
          #'-username', '<username>', # alternative way to resolve organisation scope
          #'-start-timestamp', '1735689600', # run in time windows if desired (UTC seconds)
          #'-end-timestamp', '1738367999',

          # Optional performance/index controls:
          #'-check-migration-indexes',
          #'-apply-migration-indexes',
          #'-skip-matched-count', 'true',
          #'-migration-version', '1',

          # Optional safety mode for preview:
          #'-mode', 'dry-run',
        ]

      restartPolicy: Never
